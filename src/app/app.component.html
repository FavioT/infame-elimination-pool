<nav class="border fixed split-nav paper-nav">

  <!-- Brand -->
  <div class="nav-brand">
    <h3>
      <span class="material-icons logo-icon">lightbulb</span>
      Keep
    </h3>
  </div>

  <!-- Search bar (center) -->
  <div class="search-wrap">
    <span class="material-icons search-icon">search</span>
    <input
      class="search-input"
      type="search"
      placeholder="Buscar notas..."
      [value]="searchQuery()"
      (input)="searchQuery.set($any($event.target).value)"
    />
    @if (searchQuery()) {
      <button class="btn-small search-clear" title="Limpiar" (click)="clearSearch()">
        <span class="material-icons">close</span>
      </button>
    }
  </div>

  <!-- Right nav links -->
  <div class="collapsible">
    <input id="main-nav" type="checkbox" name="main-nav">
    <label for="main-nav">
      <div class="bar1"></div>
      <div class="bar2"></div>
      <div class="bar3"></div>
    </label>
    <div class="collapsible-body">
      <ul class="inline">
        <li>
          <button class="btn-small" title="Actualizar">
            <span class="material-icons">refresh</span>
          </button>
        </li>
        <li>
          <button class="btn-small" title="Configuración">
            <span class="material-icons">settings</span>
          </button>
        </li>
        <li><button class="btn-small btn-primary avatar-btn">K</button></li>
      </ul>
    </div>
  </div>

</nav>

<main class="main-content">
  <router-outlet />
</main>
