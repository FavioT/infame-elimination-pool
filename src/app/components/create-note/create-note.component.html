<div class="card create-wrap" [style.background-color]="color()">

  <!-- Collapsed state -->
  @if (!expanded()) {
    <div class="card-body collapsed" (click)="expand()">
      <span class="placeholder-text">Crear listado...</span>
      <div class="collapsed-icons">
        <button class="btn-small action-btn" title="Lista nueva" (click)="$event.stopPropagation()">
          <span class="material-symbols-outlined">check_box</span>
        </button>
        <button class="btn-small action-btn" title="Nota con dibujo" (click)="$event.stopPropagation()">
          <span class="material-symbols-outlined">brush</span>
        </button>
        <button class="btn-small action-btn" title="Nota con imagen" (click)="$event.stopPropagation()">
          <span class="material-symbols-outlined">image</span>
        </button>
      </div>
    </div>
  }

  <!-- Expanded state -->
  @if (expanded()) {
    <div class="card-body" (click)="$event.stopPropagation()">

      <!-- Title row -->
      <div class="title-row">
        <input
          class="input-block create-title"
          placeholder="Nombre"
          [value]="title()"
          (input)="title.set($any($event.target).value)"
        />
        <button
          class="btn-small pin-btn"
          [class.is-pinned]="pinned()"
          [title]="pinned() ? 'Desfijar nota' : 'Fijar nota'"
          (click)="togglePin()">
          <span class="material-symbols-outlined">push_pin</span>
        </button>
      </div>

      <!-- List items -->
      <div class="form-group">
        <ul class="list-create">
          @for (item of items(); track $index; let i = $index) {
            <li class="list-item">
              <span class="list-bullet material-symbols-outlined">radio_button_unchecked</span>
              <input
                class="input-block list-item-input"
                [placeholder]="'Punto ' + (i + 1)"
                [value]="item"
                (input)="updateItem(i, $any($event.target).value)"
                (keydown)="onItemKeydown($event, i)"
                (click)="$event.stopPropagation()"
              />
            </li>
          }
        </ul>
        @if (items().length >= MAX_ITEMS) {
          <span class="list-limit-msg">Máximo {{ MAX_ITEMS }} puntos alcanzado</span>
        }
      </div>

    </div>

    <!-- Footer toolbar -->
    <div class="card-footer create-toolbar" (click)="$event.stopPropagation()">

      <div class="toolbar-left">
        <!-- Color picker -->
        <div class="color-picker-wrap">
          <button
            class="btn-small action-btn"
            title="Color de fondo"
            (click)="toggleColorPicker()">
            <span class="material-symbols-outlined">palette</span>
          </button>
          @if (showColorPicker()) {
            <div class="color-palette">
              @for (c of colors; track c.value) {
                <button
                  class="color-dot"
                  [style.background-color]="c.value"
                  [title]="c.name"
                  [class.is-active]="color() === c.value"
                  (click)="setColor(c.value)">
                </button>
              }
            </div>
          }
        </div>
      </div>

      <button class="btn-small btn-secondary-outline" (click)="close()">Cerrar</button>

    </div>
  }

</div>
